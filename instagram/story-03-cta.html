<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RIVAL – Story 03 CTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }

    .dl-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      width: fit-content;
    }
    .dl-info { font-family: monospace; font-size: 12px; color: #888; }
    #dl-btn {
      background: #DC2626;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    #dl-btn:hover { background: #b91c1c; transform: translateY(-1px); }
    #dl-btn:disabled { background: #555; cursor: wait; transform: none; }

    .canvas {
      width: 1080px;
      height: 1920px;
      background: #DC2626;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      flex-shrink: 0;
    }

    /* Grid texture */
    .bg-texture {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    /* Dark center vignette */
    .bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.28) 0%, transparent 70%);
    }

    /* Corner accents */
    .corner-tl {
      position: absolute;
      top: 60px; left: 60px;
      width: 80px; height: 80px;
      border-top: 5px solid rgba(255,255,255,0.25);
      border-left: 5px solid rgba(255,255,255,0.25);
    }
    .corner-tr {
      position: absolute;
      top: 60px; right: 60px;
      width: 80px; height: 80px;
      border-top: 5px solid rgba(255,255,255,0.25);
      border-right: 5px solid rgba(255,255,255,0.25);
    }
    .corner-bl {
      position: absolute;
      bottom: 60px; left: 60px;
      width: 80px; height: 80px;
      border-bottom: 5px solid rgba(255,255,255,0.25);
      border-left: 5px solid rgba(255,255,255,0.25);
    }
    .corner-br {
      position: absolute;
      bottom: 60px; right: 60px;
      width: 80px; height: 80px;
      border-bottom: 5px solid rgba(255,255,255,0.25);
      border-right: 5px solid rgba(255,255,255,0.25);
    }

    .brand-row {
      position: absolute;
      top: 72px;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
    }
    .brand-logo {
      font-size: 28px;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      letter-spacing: -1px;
    }
    .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.3); }
    .brand-handle {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      z-index: 10;
      text-align: center;
    }

    .story-label {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      margin-bottom: 64px;
    }

    .main-word {
      font-size: 200px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -12px;
      line-height: 0.85;
      margin-bottom: 40px;
      text-shadow: 0 12px 60px rgba(0,0,0,0.25);
    }

    .tagline {
      font-size: 42px;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: -0.5px;
      margin-bottom: 80px;
      line-height: 1.3;
    }

    .tagline strong {
      font-weight: 800;
      color: #fff;
    }

    /* White separator line */
    .sep {
      width: 80px;
      height: 4px;
      background: rgba(255,255,255,0.35);
      margin-bottom: 80px;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 0;
      align-items: stretch;
      margin-bottom: 80px;
      width: 100%;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
    }

    .stat-item + .stat-item {
      border-left: 1px solid rgba(255,255,255,0.2);
    }

    .stat-num {
      font-size: 64px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -3px;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.3px;
    }

    /* Big CTA button */
    .cta-btn {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 34px;
      font-weight: 800;
      padding: 36px 80px;
      border-radius: 100px;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .cta-sub {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    /* Link sticker simulation */
    .link-sticker {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
      white-space: nowrap;
    }

    .link-icon {
      font-size: 24px;
    }

    .link-text {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .link-arrow {
      font-size: 22px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="dl-bar"><span class="dl-info">1080×1920px · Story 3/3</span><button id="dl-btn" data-filename="RIVAL-story-03-cta.png" onclick="downloadPost()">&#11015;&#xFE0E;  Descargar PNG</button></div>
  <div class="canvas">
    <div class="bg-texture"></div>
    <div class="bg-vignette"></div>
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="brand-row">
      <div class="brand-logo">RIVAL</div>
      <div class="brand-dot"></div>
      <div class="brand-handle">@rivalfit.app</div>
    </div>

    <div class="content">
      <div class="story-label">Empieza hoy</div>
      <div class="main-word">RIVAL</div>
      <div class="tagline">
        Tu <strong>competencia</strong><br>mas dificil<br>eres tu de ayer.
      </div>

      <div class="sep"></div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num">850K</div>
          <div class="stat-label">Atletas</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">4.8</div>
          <div class="stat-label">Estrellas</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">100%</div>
          <div class="stat-label">Gratis</div>
        </div>
      </div>

      <div class="cta-btn">Descarga Gratis &rarr;</div>
      <div class="cta-sub">rivalfit.app</div>
    </div>

    <div class="link-sticker">
      <div class="link-icon">&#128279;</div>
      <div class="link-text">rivalfit.app</div>
      <div class="link-arrow">&#8599;</div>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    async function downloadPost() {
      const btn = document.getElementById('dl-btn');
      const filename = btn.dataset.filename;
      btn.textContent = 'Generando imagen...';
      btn.disabled = true;
      try {
        const el = document.querySelector('.canvas');
        const c = await html2canvas(el, {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          width: el.offsetWidth,
          height: el.offsetHeight
        });
        const a = document.createElement('a');
        a.download = filename;
        a.href = c.toDataURL('image/png', 1.0);
        a.click();
        btn.textContent = 'Descargado!';
        setTimeout(() => { btn.textContent = '&#11015;&#xFE0E;  Descargar PNG'; btn.disabled = false; }, 2000);
      } catch (e) {
        alert('Error al generar: ' + e.message);
        btn.textContent = '&#11015;&#xFE0E;  Descargar PNG';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
