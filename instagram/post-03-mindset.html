<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RIVAL – Post 03 Mindset</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }

    
    .dl-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      width: fit-content;
    }
    .dl-info { font-family: monospace; font-size: 12px; color: #888; }
    #dl-btn {
      background: #DC2626;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    #dl-btn:hover { background: #b91c1c; transform: translateY(-1px); }
    #dl-btn:disabled { background: #555; cursor: wait; transform: none; }

    .canvas {
      width: 1080px;
      height: 1350px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      flex-shrink: 0;
    }

    /* Texture dots */
    .bg-texture {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Red glow — bottom left */
    .bg-glow {
      position: absolute;
      bottom: -200px;
      left: -200px;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Vertical red accent bar — left */
    .accent-bar {
      position: absolute;
      left: 80px;
      top: 120px;
      bottom: 120px;
      width: 6px;
      background: linear-gradient(to bottom, transparent, #DC2626 15%, #DC2626 85%, transparent);
      border-radius: 3px;
    }

    /* Top-right decorative lines */
    .deco-lines {
      position: absolute;
      top: 80px;
      right: 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .deco-line {
      height: 3px;
      background: rgba(220,38,38,0.4);
      border-radius: 2px;
    }

    /* Bars */
    .bar-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: #DC2626;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 120px 100px 120px 148px;
    }

    .pre-label {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 6px;
      color: rgba(220, 38, 38, 0.8);
      text-transform: uppercase;
      margin-bottom: 72px;
    }

    .quote {
      font-size: 88px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -3px;
      margin-bottom: 64px;
    }

    .quote .highlight {
      color: #DC2626;
      position: relative;
    }

    .quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 120px;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 120px;
    }

    /* Sub-text */
    .sub-text {
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      max-width: 680px;
      margin-bottom: 80px;
    }

    .sub-text strong {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* Bottom logo + url */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .logo-mark {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: rgba(255,255,255,0.9);
    }

    .logo-mark span {
      color: #DC2626;
    }

    .url-tag {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }

    .url-tag span {
      color: rgba(220,38,38,0.7);
    }
  </style>
</head>
<body>
  <div class="dl-bar"><span class="dl-info">1080×1350px · Instagram Feed</span><button id="dl-btn" data-filename="RIVAL-post-03-mindset.png" onclick="downloadPost()">&#11015;&#xFE0E;  Descargar PNG</button></div>

  <div class="canvas">
    <div class="bg-texture"></div>
    <div class="bg-glow"></div>
    <div class="accent-bar"></div>
    <div class="bar-bottom"></div>

    <div class="deco-lines">
      <div class="deco-line" style="width:100px"></div>
      <div class="deco-line" style="width:60px"></div>
      <div class="deco-line" style="width:140px"></div>
    </div>

    <div class="content">
      <div class="pre-label">Mentalidad · Rival</div>

      <div class="quote">
        Tu competencia<br>
        más difícil<br>
        eres <span class="highlight">tú</span><br>
        de ayer.
      </div>

      <div class="quote-author">— RIVAL · rivalfit.app</div>

      <div class="divider"></div>

      <div class="sub-text">
        Los <strong>rankings globales</strong> no mienten.<br>
        Cada rep queda registrado.<br>
        No hay excusas. Solo marcadores.
      </div>

      <div class="bottom-row">
        <div class="logo-mark">RIVAL<span>.</span></div>
        <div class="url-tag"><span>rivalfit.app</span></div>
      </div>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    async function downloadPost() {
      const btn = document.getElementById('dl-btn');
      const filename = btn.dataset.filename;
      btn.textContent = 'Generando imagen...';
      btn.disabled = true;
      try {
        const el = document.querySelector('.canvas');
        const c = await html2canvas(el, {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          width: el.offsetWidth,
          height: el.offsetHeight
        });
        const a = document.createElement('a');
        a.download = filename;
        a.href = c.toDataURL('image/png', 1.0);
        a.click();
        btn.textContent = 'Descargado!';
        setTimeout(() => { btn.textContent = '⬇  Descargar PNG'; btn.disabled = false; }, 2000);
      } catch (e) {
        alert('Error al generar: ' + e.message);
        btn.textContent = '⬇  Descargar PNG';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
