<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RIVAL – Carousel S1</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
    
    .dl-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      width: fit-content;
    }
    .dl-info { font-family: monospace; font-size: 12px; color: #888; }
    #dl-btn {
      background: #DC2626;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    #dl-btn:hover { background: #b91c1c; transform: translateY(-1px); }
    #dl-btn:disabled { background: #555; cursor: wait; transform: none; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      flex-shrink: 0;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(220,38,38,0.1) 0%, transparent 65%);
    }

    .bar-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: #DC2626; }
    .bar-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 5px; background: #DC2626; }

    /* Slide indicator */
    .slide-dots {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 20;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .dot.active { background: #DC2626; width: 28px; border-radius: 5px; }

    /* Swipe hint */
    .swipe-hint {
      position: absolute;
      bottom: 72px;
      right: 56px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 80px;
      text-align: center;
    }

    .slide-num {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 5px;
      color: rgba(220,38,38,0.6);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .big-text {
      font-size: 90px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 24px;
    }

    .big-text .red { color: #DC2626; }
    .big-text .dim { color: rgba(255,255,255,0.3); }

    .sub {
      font-size: 32px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: -0.5px;
      margin-bottom: 64px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #DC2626;
    }
  </style>
</head>
<body>
  <div class="dl-bar"><span class="dl-info">1080×1080px · Carrusel 1/5</span><button id="dl-btn" data-filename="RIVAL-carousel-s1.png" onclick="downloadPost()">&#11015;&#xFE0E;  Descargar PNG</button></div>
  <div class="canvas">
    <div class="bg-glow"></div>
    <div class="bar-top"></div>
    <div class="bar-bottom"></div>

    <div class="content">
      <div class="slide-num">01 / 05</div>
      <div class="big-text">
        5 apps para<br>
        tu entrena<span class="red">-</span><br>
        miento.<br>
        <span class="dim">O una sola.</span>
      </div>
      <div class="sub">Desliza y descubre cuál →</div>
      <div class="logo-row">
        <div class="logo">RIVAL</div>
        <div class="logo-dot"></div>
      </div>
    </div>

    <div class="slide-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="swipe-hint">Desliza →</div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    async function downloadPost() {
      const btn = document.getElementById('dl-btn');
      const filename = btn.dataset.filename;
      btn.textContent = 'Generando imagen...';
      btn.disabled = true;
      try {
        const el = document.querySelector('.canvas');
        const c = await html2canvas(el, {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          width: el.offsetWidth,
          height: el.offsetHeight
        });
        const a = document.createElement('a');
        a.download = filename;
        a.href = c.toDataURL('image/png', 1.0);
        a.click();
        btn.textContent = 'Descargado!';
        setTimeout(() => { btn.textContent = '⬇  Descargar PNG'; btn.disabled = false; }, 2000);
      } catch (e) {
        alert('Error al generar: ' + e.message);
        btn.textContent = '⬇  Descargar PNG';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
