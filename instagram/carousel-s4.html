<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RIVAL – Carousel S4</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
    
    .dl-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      width: fit-content;
    }
    .dl-info { font-family: monospace; font-size: 12px; color: #888; }
    #dl-btn {
      background: #DC2626;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    #dl-btn:hover { background: #b91c1c; transform: translateY(-1px); }
    #dl-btn:disabled { background: #555; cursor: wait; transform: none; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      flex-shrink: 0;
    }

    .bar-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: #DC2626; }
    .bar-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 5px; background: #DC2626; }

    .slide-dots {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 20;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .dot.active { background: #DC2626; width: 28px; border-radius: 5px; }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 72px 80px;
    }

    .slide-num {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 5px;
      color: rgba(220,38,38,0.6);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .headline {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1.5px;
      margin-bottom: 48px;
    }

    /* 2x2 feature grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      flex: 1;
    }

    .feature-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(220,38,38,0.4);
    }

    .feature-icon {
      font-size: 40px;
    }

    .feature-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .feature-desc {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      color: rgba(255,255,255,0.4);
      line-height: 1.4;
    }

    .feature-badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #DC2626;
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 100px;
      padding: 4px 12px;
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="dl-bar"><span class="dl-info">1080×1080px · Carrusel 4/5</span><button id="dl-btn" data-filename="RIVAL-carousel-s4.png" onclick="downloadPost()">&#11015;&#xFE0E;  Descargar PNG</button></div>
  <div class="canvas">
    <div class="bar-top"></div>
    <div class="bar-bottom"></div>

    <div class="content">
      <div class="slide-num">04 / 05</div>
      <div class="headline">Lo que incluye RIVAL</div>

      <div class="grid">
        <div class="feature-card">
          <div class="feature-icon">🏆</div>
          <div class="feature-title">Rankings</div>
          <div class="feature-desc">Compite globalmente. Marcadores reales.</div>
          <div class="feature-badge">Global</div>
        </div>

        <div class="feature-card">
          <div class="feature-icon">⚔️</div>
          <div class="feature-title">Duelos 1v1</div>
          <div class="feature-desc">Reta a cualquier atleta del mundo.</div>
          <div class="feature-badge">7 días</div>
        </div>

        <div class="feature-card">
          <div class="feature-icon">🤖</div>
          <div class="feature-title">IA Coaching</div>
          <div class="feature-desc">Programación personalizada con IA.</div>
          <div class="feature-badge">Pro</div>
        </div>

        <div class="feature-card">
          <div class="feature-icon">📊</div>
          <div class="feature-title">Analytics</div>
          <div class="feature-desc">Volumen, 1RM estimado, progresión.</div>
          <div class="feature-badge">Gratis</div>
        </div>
      </div>
    </div>

    <div class="slide-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    async function downloadPost() {
      const btn = document.getElementById('dl-btn');
      const filename = btn.dataset.filename;
      btn.textContent = 'Generando imagen...';
      btn.disabled = true;
      try {
        const el = document.querySelector('.canvas');
        const c = await html2canvas(el, {
          scale: 2,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          width: el.offsetWidth,
          height: el.offsetHeight
        });
        const a = document.createElement('a');
        a.download = filename;
        a.href = c.toDataURL('image/png', 1.0);
        a.click();
        btn.textContent = 'Descargado!';
        setTimeout(() => { btn.textContent = '⬇  Descargar PNG'; btn.disabled = false; }, 2000);
      } catch (e) {
        alert('Error al generar: ' + e.message);
        btn.textContent = '⬇  Descargar PNG';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
