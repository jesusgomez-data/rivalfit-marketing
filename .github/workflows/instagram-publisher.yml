name: RivalFit Instagram Publisher

on:
  schedule:
    - cron: '0 7  * * 1'
    - cron: '0 16 * * 2'
    - cron: '0 10 * * 3'
    - cron: '0 17 * * 4'
    - cron: '0 8  * * 5'

  workflow_dispatch:
    inputs:
      dia:
        description: 'Force day (Monday/Tuesday/etc)'
        required: false
        default: ''
      test:
        description: 'Test mode true/false'
        required: false
        default: 'false'

env:
  PYTHONIOENCODING: utf-8

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write config
        run: |
          printf '{"instagram_user_id":"%s","instagram_access_token":"%s","imgbb_api_key":"%s","hora_publicacion":"09:00","notificaciones_email":"rival.app.official@gmail.com"}' \
            "$IG_USER_ID" "$IG_ACCESS_TOKEN" "$IMGBB_API_KEY" \
            > instagram/scheduler/config.json
          echo "config.json written"
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Publish
        working-directory: instagram/scheduler
        run: |
          ARGS="--force-time"
          if [ -n "${{ github.event.inputs.dia }}" ]; then
            ARGS="$ARGS --dia ${{ github.event.inputs.dia }}"
          fi
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          python publisher.py $ARGS

      - name: Cleanup config
        if: always()
        run: rm -f instagram/scheduler/config.json
