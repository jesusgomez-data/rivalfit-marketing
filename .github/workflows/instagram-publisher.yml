name: RivalFit Instagram Publisher

on:
  schedule:
    - cron: '0 7  * * 1'
    - cron: '0 16 * * 2'
    - cron: '0 10 * * 3'
    - cron: '0 17 * * 4'
    - cron: '0 8  * * 5'

  workflow_dispatch:
    inputs:
      dia:
        description: 'Force day (Monday/Tuesday/etc) - empty for today'
        required: false
        default: ''
      test:
        description: 'Test mode - no real publish (true/false)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r instagram/scheduler/requirements.txt

      - name: Write config
        working-directory: instagram/scheduler
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os, json
          cfg = {
            "instagram_user_id": os.environ["IG_USER_ID"],
            "instagram_access_token": os.environ["IG_ACCESS_TOKEN"],
            "imgbb_api_key": os.environ["IMGBB_API_KEY"],
            "hora_publicacion": "09:00",
            "notificaciones_email": "rival.app.official@gmail.com"
          }
          json.dump(cfg, open("config.json", "w"))
          print("config.json written OK")
          PYEOF

      - name: Publish
        working-directory: instagram/scheduler
        run: |
          ARGS="--force-time"
          if [ -n "${{ github.event.inputs.dia }}" ]; then
            ARGS="$ARGS --dia ${{ github.event.inputs.dia }}"
          fi
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          python publisher.py $ARGS

      - name: Cleanup config
        if: always()
        working-directory: instagram/scheduler
        run: rm -f config.json
