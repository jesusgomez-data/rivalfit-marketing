name: RivalFit Instagram Publisher

on:
  schedule:
    - cron: '0 7  * * 1'
    - cron: '0 16 * * 2'
    - cron: '0 10 * * 3'
    - cron: '0 17 * * 4'
    - cron: '0 8  * * 5'

  workflow_dispatch:
    inputs:
      dia:
        description: 'Force day (Monday/Tuesday/etc)'
        required: false
        default: ''
      test:
        description: 'Test mode true/false'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Write config
        run: python -c "import os,json; json.dump({'instagram_user_id':os.environ['IG_USER_ID'],'instagram_access_token':os.environ['IG_ACCESS_TOKEN'],'imgbb_api_key':os.environ['IMGBB_API_KEY'],'hora_publicacion':'09:00','notificaciones_email':'rival.app.official@gmail.com'},open('instagram/scheduler/config.json','w'))"

      - name: Publish
        run: |
          ARGS="--force-time"
          DIA="${{ github.event.inputs.dia }}"
          TEST="${{ github.event.inputs.test }}"
          if [ -n "$DIA" ]; then ARGS="$ARGS --dia $DIA"; fi
          if [ "$TEST" = "true" ]; then ARGS="$ARGS --test"; fi
          python instagram/scheduler/publisher.py $ARGS

      - name: Cleanup
        if: always()
        run: rm -f instagram/scheduler/config.json
